name: StrategyHarvester Scanner

# Runs ONE scan cycle every hour via GitHub's free cron, then commits the
# updated SQLite DB back to the repo so state survives between stateless runs.
on:
  schedule:
    # Every 30 min at :07 and :37 — deliberately OFF the :00/:30 peak, where
    # GitHub heavily delays/drops scheduled runs. GitHub cron is best-effort
    # and can still lag; if it proves unreliable, trigger via an external cron
    # hitting the workflow_dispatch API (see SETUP_GITHUB_ACTIONS.md).
    - cron: "7,37 * * * *"
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

# Let the job push the updated DB back to the repo.
permissions:
  contents: write

# If a run is still going when the next hour fires, let it finish — don't
# overlap (overlapping runs could race on the committed DB).
concurrency:
  group: scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # safety: never let a hung scan burn CI minutes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_prod.txt

      - name: Run one scan cycle
        env:
          # We trade on binance.com (global); data_fetcher routes binance's
          # public OHLCV through the vision mirror (data-api.binance.vision),
          # which — unlike api.binance.com and api.bybit.com — IS reachable
          # from GitHub's US runners, so the cloud scanner can see real
          # binance.com data too. If it's ever unreachable, the built-in
          # fallback chain (bybit -> okx -> kucoin -> kraken) takes over
          # automatically, so this is safe to leave set.
          DATA_EXCHANGE:      binance
          CRON_NEXT_IN:       30m
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
        run: python -m scheduler.runner_cron

      - name: Commit updated state back to repo
        if: always()           # persist DB even if the scan step errored
        run: |
          git config user.name  "stratharv-bot"
          git config user.email "stratharv-bot@users.noreply.github.com"
          git add -f strategy_harvester.db config.json docs/index.html
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(cron): update state $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Re-sync in case another run pushed while we scanned, then push.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
