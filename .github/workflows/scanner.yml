name: StrategyHarvester Scanner

# Runs ONE scan cycle every hour via GitHub's free cron, then commits the
# updated SQLite DB back to the repo so state survives between stateless runs.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC); public repo = free minutes
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

# Let the job push the updated DB back to the repo.
permissions:
  contents: write

# If a run is still going when the next hour fires, let it finish — don't
# overlap (overlapping runs could race on the committed DB).
concurrency:
  group: scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # safety: never let a hung scan burn CI minutes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_prod.txt

      - name: Run one scan cycle
        env:
          # Bybit (like Binance) geo-blocks GitHub's US runners, so use OKX
          # directly in the cloud — avoids a wasted failed attempt + a repeated
          # "bybit failed" alert each run. Local runs still default to Bybit.
          DATA_EXCHANGE:      okx
          CRON_NEXT_IN:       30m
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
        run: python -m scheduler.runner_cron

      - name: Commit updated state back to repo
        if: always()           # persist DB even if the scan step errored
        run: |
          git config user.name  "stratharv-bot"
          git config user.email "stratharv-bot@users.noreply.github.com"
          git add -f strategy_harvester.db config.json docs/index.html
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(cron): update state $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Re-sync in case another run pushed while we scanned, then push.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
